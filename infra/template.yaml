AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Clark email gateway on Lambda. Replaces the always-on ECS Fargate service
  with two functions built from one artifact:
    - WebFunction  : MCP (/mcp), the /send relay and /health, behind a
                     Function URL (HTTPS). MCP runs stateless.
    - PollFunction : one inbound poll sweep, driven by an EventBridge schedule
                     (~60s), replacing the in-process asyncio poll loop.
  Inbound-message dedup and daily send counts live in one DynamoDB table.
  Secrets (Google SA key, HMAC secret, app config) come from Secrets Manager.
  The gateway<->Clark HMAC contract is unchanged.

Parameters:
  SecretsArn:
    Type: String
    Description: ARN of the Secrets Manager secret holding GOOGLE_SERVICE_ACCOUNT_JSON,
      CLARK_INBOUND_HMAC_SECRET and APP_CONFIG_JSON (JSON keys).
  ClarkBaseUrl:
    Type: String
    Default: https://clark.willcrestpartners.com
    Description: Base URL of the Clark app. Inbound-webhook and authorized-senders
      URLs are derived from it.
  SenderEmail:
    Type: String
    Default: clark@willcrestpartners.com
  # ── Per-user OAuth on /mcp (specs/connector-oauth.md in the Clark repo) ──
  # None of these are secrets: pool id / client id / Hosted UI domain come from
  # the ClarkAuth CDK stack outputs (client "clark-connector" is a PUBLIC
  # client — PKCE, no secret). Leave the Connector* values as-is on routine
  # deploys once set; CloudFormation keeps previous parameter values when
  # --parameter-overrides omits them.
  ConnectorAuthRequired:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Cutover flag. "false" = middleware verifies/injects identity from a
      bearer token when present but token-less calls still work (legacy
      self-asserted caller_email honored). "true" = /mcp rejects anything
      without a valid Cognito token (401 + WWW-Authenticate).
  ConnectorCognitoPoolId:
    Type: String
    Default: ""
    Description: Cognito user pool id (e.g. us-east-1_XXXXXXXXX) — the pool behind
      clark.willcrestpartners.com logins. From the ClarkAuth stack UserPoolId output.
  ConnectorCognitoDomain:
    Type: String
    Default: ""
    Description: Cognito Hosted UI base URL
      (e.g. https://willcrest-clark.auth.us-east-1.amazoncognito.com); its
      /oauth2/userInfo endpoint validates tokens + resolves the email. From the
      ClarkAuth stack HostedUiDomain output.
  ConnectorClientId:
    Type: String
    Default: ""
    Description: App client id of "clark-connector" (the claude.ai connector client).
      From the ClarkAuth stack ConnectorClientId output.
  ConnectorDcrShim:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Serve the static dynamic-client-registration shim
      (/.well-known/oauth-authorization-server + /register). Only needed if
      claude.ai's manual client-credentials path (connector Advanced settings)
      turns out to be unavailable; leave "false" otherwise.

Globals:
  Function:
    Runtime: python3.12
    MemorySize: 512
    Architectures: [x86_64]
    Environment:
      Variables:
        GATEWAY_SECRETS_ARN: !Ref SecretsArn
        GATEWAY_TABLE: !Ref GatewayTable
        SENDER_EMAIL: !Ref SenderEmail
        CLARK_WEBHOOK_URL: !Sub "${ClarkBaseUrl}/api/email/inbound"
        CLARK_AUTHORIZED_SENDERS_URL: !Sub "${ClarkBaseUrl}/api/email/authorized-senders"
        # Base URL for the CIM-intake connector routes (/api/connector/*), used by
        # the search_companies / analyze_cim / submit_cim_intake MCP tools.
        CLARK_CONNECTOR_BASE_URL: !Ref ClarkBaseUrl
        AUDIT_LOG_PATH: /tmp/audit_log.jsonl

Resources:
  GatewayTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: clark-email-gateway
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: rfc822_message_id
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: rfc822-index
          KeySchema:
            - AttributeName: rfc822_message_id
              KeyType: HASH
          Projection:
            ProjectionType: KEYS_ONLY
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  WebFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: clark-email-web
      # Run the ASGI app as a persistent uvicorn server via the AWS Lambda Web
      # Adapter (Handler = the run.sh command, invoked by the LWA exec wrapper).
      # A persistent server runs the Starlette lifespan / MCP session manager
      # once per execution environment; a per-invocation adapter (Mangum) does
      # not, and re-entering the MCP session manager fails.
      Handler: run.sh
      CodeUri: ../build/
      Timeout: 30
      Layers:
        - arn:aws:lambda:us-east-1:753240598075:layer:LambdaAdapterLayerX86:25
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: buffered
          PORT: "8080"
          MCP_STATELESS_HTTP: "true"
          # Per-user OAuth on /mcp (oauth.py). Web function only — the poller
          # never serves MCP traffic.
          CONNECTOR_AUTH_REQUIRED: !Ref ConnectorAuthRequired
          CONNECTOR_COGNITO_POOL_ID: !Ref ConnectorCognitoPoolId
          CONNECTOR_COGNITO_DOMAIN: !Ref ConnectorCognitoDomain
          CONNECTOR_CLIENT_ID: !Ref ConnectorClientId
          CONNECTOR_DCR_SHIM: !Ref ConnectorDcrShim
      FunctionUrlConfig:
        AuthType: NONE
      Policies:
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref SecretsArn
        - DynamoDBCrudPolicy:
            TableName: !Ref GatewayTable

  PollFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: clark-email-poller
      Handler: lambda_poll.handler
      CodeUri: ../build/
      # Timeout below the rate(1 minute) schedule so sweeps can't stack up.
      # (Typical sweep: <1s; max observed: ~4s.)
      Timeout: 55
      # No ReservedConcurrentExecutions: this account's concurrency limit is 10,
      # and reserving any capacity would drop unreserved below AWS's minimum of
      # 10. Overlap protection instead comes from the atomic per-message CLAIM#
      # rows (DynamoDB conditional put in state_store.claim_message) — at most
      # one sweep forwards any given message.
      Policies:
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref SecretsArn
        - DynamoDBCrudPolicy:
            TableName: !Ref GatewayTable
      Events:
        Tick:
          Type: Schedule
          Properties:
            Schedule: rate(1 minute)
            # Always enabled post-cutover (the ECS gateway is retired). To pause
            # inbound polling for maintenance, disable the generated EventBridge
            # rule directly: aws events disable-rule --name <PollFunctionTick rule>.
            Enabled: true

Outputs:
  WebFunctionUrl:
    Description: HTTPS base URL. Clark's EMAIL_GATEWAY_SEND_URL -> <url>send,
      Cowork MCP connector -> <url>mcp
    Value: !GetAtt WebFunctionUrl.FunctionUrl
  TableName:
    Value: !Ref GatewayTable
  PollFunctionName:
    Value: !Ref PollFunction
